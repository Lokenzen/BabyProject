name: Build and Deploy Angular
on:
  push:
    branches:
      - main # Change en 'master' si c'est le nom de ta branche principale

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Remplace 'BabyProject' par le nom exact de ton projet dans angular.json
        run: npx ng build --configuration production --base-href /BabyProject/

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/BabyProject/browser # Chemin vers ton build Angular 17+
          branch: gh-pages # La branche où le site sera hébergé