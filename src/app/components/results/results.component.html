<div class="results-container">
  <mat-card class="results-card">
    <mat-card-header>
      <mat-card-title>Résultats des Données</mat-card-title>
      <mat-card-subtitle>Liste de tous les enregistrements</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <!-- Actions -->
      <div class="actions-bar">
        <button mat-raised-button color="primary" (click)="goToForm()">
          <mat-icon>add</mat-icon>
          Ajouter une nouvelle entrée
        </button>
        <button mat-icon-button (click)="loadData()" matTooltip="Actualiser les données">
          <mat-icon>refresh</mat-icon>
        </button>
      </div>

      <!-- Filtre -->
      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Filtrer</mat-label>
        <input matInput placeholder="Rechercher..." (keyup)="applyFilter($event)">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <!-- Spinner de chargement -->
      <div *ngIf="isLoading" class="loading-spinner">
        <mat-spinner diameter="40"></mat-spinner>
        <p>Chargement des données...</p>
      </div>

      <!-- Tableau -->
      <div class="table-container" *ngIf="!isLoading && dataSource.data.length > 0">
        <table mat-table [dataSource]="dataSource" matSort (matSortChange)="sortData($event)" class="data-table">
          <!-- Nom Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Nom</th>
            <td mat-cell *matCellDef="let element">
              <strong>{{ element.name || '-' }}</strong>
            </td>
          </ng-container>

          <!-- Email Column -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
            <td mat-cell *matCellDef="let element">
              <a *ngIf="element.email" [href]="'mailto:' + element.email" class="email-link">
                {{ element.email }}
              </a>
              <span *ngIf="!element.email">-</span>
            </td>
          </ng-container>

          <!-- Téléphone Column -->
          <ng-container matColumnDef="phone">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Téléphone</th>
            <td mat-cell *matCellDef="let element">
              <a *ngIf="element.phone" [href]="'tel:' + element.phone" class="phone-link">
                {{ element.phone }}
              </a>
              <span *ngIf="!element.phone">-</span>
            </td>
          </ng-container>

          <!-- Catégorie Column -->
          <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Catégorie</th>
            <td mat-cell *matCellDef="let element">
              <span class="category-badge" [ngClass]="'category-' + element.category">
                {{ element.category || '-' }}
              </span>
            </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-column">Actions</th>
            <td mat-cell *matCellDef="let element" class="actions-cell">
              <button mat-icon-button color="warn" (click)="deleteRow(element.id)" matTooltip="Supprimer">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="data-row"></tr>
        </table>
      </div>

      <!-- Message vide -->
      <div *ngIf="!isLoading && dataSource.data.length === 0" class="empty-state">
        <mat-icon>inbox</mat-icon>
        <p>Aucune donnée disponible</p>
        <button mat-raised-button color="primary" (click)="goToForm()">
          Ajouter une entrée
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
